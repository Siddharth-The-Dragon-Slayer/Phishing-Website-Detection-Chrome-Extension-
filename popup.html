<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 350px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2196F3;
        }
        
        .status-card {
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            text-align: center;
        }
        
        .safe {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }
        
        .warning {
            background: linear-gradient(135deg, #FF9800, #f57c00);
            color: white;
        }
        
        .danger {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }
        
        .analyzing {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        .score {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .details {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .feature {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid #ddd;
        }
        
        .feature:last-child {
            border-bottom: none;
        }
        
        .btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
        }
        
        .btn:hover {
            background: #1976D2;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #2196F3;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛡️ DMBI Phishing Detector</div>
    </div>
    
    <div id="status-container">
        <div class="status-card analyzing">
            <div class="loading"></div>
            <div>Analyzing current website...</div>
        </div>
    </div>
    
    <div id="details-container" style="display: none;">
        <div class="details">
            <h3>Detection Details</h3>
            <div id="features-list"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="sites-checked">0</div>
                <div>Sites Checked</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="threats-blocked">0</div>
                <div>Threats Blocked</div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn" id="scan-btn">🔍 Scan Current Site</button>
        <button class="btn" id="settings-btn">⚙️ Settings</button>
        <button class="btn" id="report-btn">📊 View Report</button>
    </div>
    
    <script src="simple_detector.js"></script>
    <script src="popup.js"></script>
</body>
</html>
